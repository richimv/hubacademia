<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulacro Médico - Hub Academia</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <!-- CSS Moderno (Glassmorphism) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/quiz.css?v=20260420">
    <link rel="stylesheet" href="css/modal.css?v=20260420">
    <link rel="stylesheet" href="css/components.css?v=20260420">
</head>

<body class="quiz-body">

    <!-- Pantalla de Carga -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="medical-pulse"></div>
        <h2 id="loadingTitle" style="margin-top: 1.5rem; font-weight: 600; text-align: center;">Analizando Biblioteca
            Médica...</h2>
        <p id="loadingSubtitle" style="color: #94a3b8; font-size: 0.9rem; text-align: center; margin-top: 0.5rem;">
            Consultando fuentes y generando preguntas...</p>
    </div>

    <!-- NEW: Back Button -->
    <a href="javascript:history.back()" class="btn-back-pulse" title="Salir del Quiz">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Contenedor del Quiz -->
    <div class="quiz-container">
        <div class="question-header">
            <div>
                <span
                    style="color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Pregunta
                    <span id="currentQ">1</span>/<span id="maxQ">10</span></span>
                <div
                    style="height: 6px; width: 100px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 0.5rem; overflow: hidden;">
                    <div id="progressBar"
                        style="height: 100%; width: 10%; background: #3b82f6; transition: width 0.3s;"></div>
                </div>
            </div>
            <div class="timer-badge">
                <i class="fas fa-clock"></i>
                <span id="timer">45s</span>
            </div>
        </div>

        <div id="questionLayout" class="question-layout-grid">
            <div id="questionImageContainer" class="hidden q-image-container-premium">
                <img id="questionImage" src="" alt="Imagen de contexto" loading="lazy">
            </div>

            <div class="question-text" id="questionText">
                Cargando pregunta...
            </div>
        </div>

        <div class="options-grid" id="optionsGrid">
            <!-- Botones generados por JS -->
        </div>

        <div id="feedbackBox" class="feedback-box">
            <h4 style="margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; font-size: 1.25rem; color: #60a5fa;">
                <i class="fas fa-info-circle"></i> Explicación Médica
            </h4>
            <p id="explanationText" style="font-size: 1.15rem; line-height: 1.6; color: #93c5fd; margin-bottom: 1.5rem;"></p>
            <div id="explanationImageContainer" class="hidden q-explanation-image-container-premium">
                <img id="explanationImage" src="" alt="Imagen explicativa" loading="lazy">
            </div>
            <button id="nextBtn"
                style="margin-top: 1rem; background: rgba(255,255,255,0.1); border: none; padding: 0.5rem 1.5rem; border-radius: 8px; color: white; cursor: pointer;">
                Siguiente Pregunta <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </div>

        <!-- Contenedor Post-Examen (Hidden) -->
        <div id="reviewContainer" class="review-container hidden">
            <div class="review-header">
                <h2><i class="fas fa-clipboard-check"></i> Corrección de Simulacro</h2>
                <button id="btn-top-exit" class="btn-top-exit"><i class="fas fa-times"></i> Salir al Hub</button>
            </div>
            <div id="reviewFeed" class="review-feed">
                <!-- Tarjetas inyectadas por JS -->
            </div>
        </div>
    </div>

    <!-- Modal de Resultados -->
    <div id="resultsOverlay" class="results-overlay">
        <div class="results-card">
            <h2 style="margin-bottom: 1rem;">¡Simulacro Finalizado!</h2>
            <div class="score-circle-svg-container" id="scoreCircle">
                <svg viewBox="0 0 100 100" class="svg-score-chart">
                    <!-- Aro estático de fondo -->
                    <circle class="svg-circle-bg" cx="50" cy="50" r="45"></circle>
                    <!-- Aro animado de progreso -->
                    <circle class="svg-circle-progress" id="svgScoreProgress" cx="50" cy="50" r="45"></circle>
                </svg>
                <span class="score-value" id="finalScore">0/10</span>
            </div>
            <p style="color: #94a3b8; margin-bottom: 2rem;">¿Qué te pareció el nivel?</p>

            <div class="actions" style="flex-direction: column;">
                <button id="btn-review-exam" type="button" onclick="event.preventDefault(); window.showExamReview(); return false;" class="btn-neon"
                    style="width: 100%; margin-bottom: 1rem;">
                    <i class="fas fa-eye"></i> Ver Corrección del Examen
                </button>
                <div style="display: flex; gap: 1rem; justify-content: center; width: 100%;">
                    <button id="btn-exit-quiz" class="btn-secondary"
                        style="flex: 1; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer;">
                        Salir
                    </button>
                    <button onclick="location.reload()" class="btn-secondary"
                        style="flex: 1; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer;">
                        Nuevo Examen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/services/authApiService.js"></script>
    <script src="js/services/analyticsApiService.js"></script>
    <script src="js/sessionManager.js"></script>
    <script src="js/ui/components.js?v=20260420"></script>
    <script src="js/ui/uiManager.js?v=20260420"></script>
    <script src="js/app.js?v=20260420"></script>
    <script src="js/demoData.js"></script>
    <script type="module" src="js/quiz.js?v=20260420_v2"></script>
</body>

</html>
