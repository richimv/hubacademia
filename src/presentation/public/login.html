<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Hub Academia</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/theme.css?v=19949b89">
    <link rel="stylesheet" href="/css/base.css?v=19949b89">
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --card-bg: #121212;
            --accent-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--primary-bg);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Ambient Background */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(60px);
            z-index: -1;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Graduation Cap Logo with Gradient */
        .logo-container {
            margin-bottom: 2rem;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
            /* Aplicar un filtro de brillo si es necesario o usar el gradiente del SVG si lo tuviera */
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3));
        }

        .welcome-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            letter-spacing: -0.02em;
        }

        .welcome-text {
            color: var(--text-dim);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            padding: 0 10px;
        }

        /* Premium Google Button */
        .btn-google-auth {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 1rem;
            border-radius: 100px; /* Estilo Cápsula Manta */
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .btn-google-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
            background: #f8fafc;
        }

        .btn-google-auth:active {
            transform: translateY(0);
        }

        .btn-google-auth img {
            width: 22px;
            height: 22px;
        }

        /* Terms Footer - Manta Style */
        .terms-footer {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .terms-footer a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .terms-footer a:hover {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 2rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }


    </style>
</head>

<body>
    <div class="ambient-glow"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="/assets/logo.png" alt="Hub Academia" class="logo-icon">
        </div>

        <h1 class="welcome-title">¡Bienvenido!</h1>
        <p class="welcome-text">
            Accede a tu cuenta para continuar tu aprendizaje con Hub Academia.
        </p>

        <button class="btn-google-auth" id="google-login-btn">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
            Continuar con Google
        </button>

        <div class="terms-footer">
            Al crear una cuenta, acepto los 
            <a href="/terms">Términos de Servicio</a> y la 
            <a href="/privacy">Política de Privacidad</a> de Hub Academia
        </div>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

    <!-- Scripts de Lógica -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js?v=19949b89"></script>
    <script src="/js/services/networkService.js?v=19949b89"></script>
    <script src="/js/services/authApiService.js?v=19949b89"></script>
    <script src="/js/sessionManager.js?v=19949b89"></script>

    <script>
        /**
         * Login vía Google OAuth (Supabase redirect flow).
         * Este es el único flujo confiable en Chrome 145+ (post-FedCM).
         * One Tap fue removido por incompatibilidad con el manejo de nonce de FedCM/Supabase.
         */
        document.addEventListener('DOMContentLoaded', () => {
            const googleBtn = document.getElementById('google-login-btn');
            if (googleBtn) {
                googleBtn.addEventListener('click', async () => {
                    const redirectTo = window.location.origin + '/';
                    try {
                        const { error } = await window.supabaseClient.auth.signInWithOAuth({
                            provider: 'google',
                            options: { redirectTo }
                        });
                        if (error) throw error;
                    } catch (err) {
                        console.error('❌ Error OAuth:', err);
                    }
                });
            }
        });
    </script>
</body>

</html>
