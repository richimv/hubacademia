<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulacro Médico - Hub Academia</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS Moderno (Glassmorphism) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Centralized Design System Tokens -->
    <link rel="stylesheet" href="/css/theme.css?v=19949b89">
    <link rel="stylesheet" href="/css/quiz.css?v=19949b89">
    <link rel="stylesheet" href="/css/modal.css?v=19949b89">
    <link rel="stylesheet" href="/css/components.css?v=19949b89">
</head>

<body class="quiz-body">

    <!-- Pantalla de Carga (Glassmorphism UI) -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-card">
            <div class="premium-spinner"></div>
            <h2 id="loadingTitle" class="loading-title">Preparando simulacro...</h2>
            <p id="loadingSubtitle" class="loading-subtitle" style="margin-bottom: 2.5rem;">Consultando fuentes oficiales y configurando preguntas...</p>
            
            <!-- Tip Box Dinámico -->
            <div class="tip-box" style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 1.5rem; border: 1px dashed rgba(255,255,255,0.1); margin: 0 auto; max-width: 320px;">
                <p style="color: #3b82f6; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em;">¿Sabías que?</p>
                <p id="loadingTip" style="color: #cbd5e1; font-size: 0.95rem; line-height: 1.5; transition: opacity 0.5s ease; opacity: 0;">Cargando tips de estudio...</p>
            </div>
        </div>
    </div>

    <!-- NEW: Back Button -->
    <a href="javascript:history.back()" class="btn-back-pulse" title="Salir del Quiz">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Contenedor del Quiz -->
    <div class="quiz-container">
        <div class="question-header">
            <div>
                <span
                    style="color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Pregunta
                    <span id="currentQ">1</span>/<span id="maxQ">10</span></span>
                <div
                    style="height: 6px; width: 100px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 0.5rem; overflow: hidden;">
                    <div id="progressBar"
                        style="height: 100%; width: 10%; background: #3b82f6; transition: width 0.3s;"></div>
                </div>
            </div>
            <div class="timer-badge">
                <i class="fas fa-clock"></i>
                <span id="timer">45s</span>
            </div>
        </div>

        <div id="questionLayout" class="question-layout-grid">
            <div id="questionImageContainer" class="hidden q-image-container-premium">
                <img id="questionImage" src="" alt="Imagen de contexto" loading="lazy">
            </div>

            <div class="question-text" id="questionText">
                Cargando pregunta...
            </div>
        </div>

        <div class="options-grid" id="optionsGrid">
            <!-- Botones generados por JS -->
        </div>

        <div id="feedbackBox" class="feedback-box">
            <h5 id="explanation-title" class="mb-3" style="color: #60a5fa; font-weight: 700; letter-spacing: -0.02em;">
                <i class="fas fa-info-circle"></i> Sustento Técnico
            </h5>
            <div id="explanationText" style="font-size: 1.15rem; line-height: 1.6; color: #93c5fd; margin-bottom: 1.5rem;"></div>
            <div id="explanationImageContainer" class="hidden q-explanation-image-container-premium">
                <img id="explanationImage" src="" alt="Imagen explicativa" loading="lazy">
            </div>
        </div>

        <div id="nextBtnContainer" class="next-btn-container hidden">
            <button id="nextBtn" class="btn-next-premium">
                Siguiente Pregunta <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </div>

        <!-- Contenedor Post-Examen (Hidden) -->
        <div id="reviewContainer" class="review-container hidden">
            <div class="review-header">
                <h2><i class="fas fa-clipboard-check"></i> Corrección de Simulacro</h2>
                <button id="btn-top-exit" class="btn-top-exit"><i class="fas fa-times"></i> Salir</button>
            </div>
            <div id="reviewFeed" class="review-feed">
                <!-- Tarjetas inyectadas por JS -->
            </div>
        </div>
    </div>

    <!-- Modal de Resultados -->
    <div id="resultsOverlay" class="results-overlay">
        <div class="results-card">
            <h2 style="margin-bottom: 1rem;">¡Simulacro Finalizado!</h2>
            <div class="score-circle-svg-container" id="scoreCircle">
                <svg viewBox="0 0 100 100" class="svg-score-chart">
                    <!-- Aro estático de fondo -->
                    <circle class="svg-circle-bg" cx="50" cy="50" r="45"></circle>
                    <!-- Aro animado de progreso -->
                    <circle class="svg-circle-progress" id="svgScoreProgress" cx="50" cy="50" r="45"></circle>
                </svg>
                <span class="score-value" id="finalScore">0/10</span>
            </div>
            <p style="color: #94a3b8; margin-bottom: 2rem;">¿Qué te pareció el nivel?</p>

            <div class="actions" style="flex-direction: column;">
                <button id="btn-review-exam" type="button" onclick="event.preventDefault(); window.showExamReview(); return false;" class="btn-neon"
                    style="width: 100%; margin-bottom: 1rem;">
                    <i class="fas fa-eye"></i> Ver Corrección del Examen
                </button>
                <div style="display: flex; gap: 1rem; justify-content: center; width: 100%;">
                    <button id="btn-exit-quiz" class="btn-secondary"
                        style="flex: 1; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer;">
                        Salir
                    </button>
                    <button onclick="window.startNewExam()" class="btn-secondary"
                        style="flex: 1; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer;">
                        Nuevo Examen
                    </button>
                </div>
            </div>
        </div>
        <style>
        /* 🌑 Unified Dark Loader System */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3.5rem;
            border-radius: 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 1);
            max-width: 400px;
            width: 90%;
        }

        .premium-spinner {
            width: 70px;
            height: 70px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #fff;
            border-radius: 50%;
            margin: 0 auto 2.5rem;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        .loading-subtitle {
            color: #64748b;
            font-size: 1.1rem;
        }
    </style>
    </div>

    <!-- Visor Lightbox Premium para Imágenes -->
    <div id="lightboxModal" class="lightbox-modal">
        <button class="lightbox-close" id="lightboxClose" title="Cerrar (Esc)"><i class="fas fa-times"></i></button>
        <div class="lightbox-controls">
            <button id="lightboxZoomOut" title="Alejar"><i class="fas fa-minus"></i></button>
            <button id="lightboxZoomReset" title="Restaurar (1:1)"><i class="fas fa-sync-alt"></i></button>
            <button id="lightboxZoomIn" title="Acercar"><i class="fas fa-plus"></i></button>
        </div>
        <div class="lightbox-viewport" id="lightboxViewport">
            <img id="lightboxImage" src="" alt="Vista ampliada" draggable="false">
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/config.js?v=19949b89"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/utils/markdown-renderer.js?v=19949b89"></script>
    <script src="/js/services/networkService.js?v=19949b89"></script>
    <script src="/js/services/authApiService.js?v=19949b89"></script>
    <script src="/js/services/analyticsApiService.js?v=19949b89"></script>
    <script src="/js/sessionManager.js?v=19949b89"></script>
    <script src="/js/ui/components.js?v=19949b89"></script>
    <script src="/js/ui/confirmationModal.js?v=19949b89"></script>
    <script src="/js/ui/uiManager.js?v=19949b89"></script>
    <script src="/js/app.js?v=19949b89"></script>
    <script type="module" src="/js/quiz.js?v=19949b89"></script>
</body>

</html>
