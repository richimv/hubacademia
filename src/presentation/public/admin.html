<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - Hub Academia</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- NUEVA ESTRUCTURA CSS -->
    <link rel="stylesheet" href="/css/components.css?v=21c49b5e"> <!-- SOLUCIÓN: Cargar los estilos de los componentes -->
    <link rel="stylesheet" href="/css/theme.css?v=21c49b5e">
    <link rel="stylesheet" href="/css/base.css?v=21c49b5e">
    <link rel="stylesheet" href="/css/header.css?v=21c49b5e">
    <link rel="stylesheet" href="/css/admin.css?v=21c49b5e">
    <link rel="stylesheet" href="/css/admin-units.css?v=21c49b5e"> <!-- NUEVO: Estilos para el gestor de unidades -->
    <link rel="stylesheet" href="/css/modal.css?v=21c49b5e">
    <link rel="stylesheet" href="/css/sidebar.css?v=21c49b5e">
    <!-- CORRECCIÓN: Eliminados archivos CSS que ya no existen para limpiar la consola -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CORRECCIÓN: Añadir Favicon para el ícono de la pestaña -->
    <link rel="icon" type="image/png" href="/assets/logo.png">

    <!-- FIX: Cargar librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- NUEVO: Librería SheetJS para parsear ficheros Excel (.xlsx, .csv) limpiamente en el navegador -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Editor Profesional: TinyMCE 6 (Mini-Word con soporte avanzado de Excel/Tablas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
</head>

<body>
    <header class="admin-header">
        <!-- ESTRUCTURA UNIFICADA -->
        <a href="/" class="logo">
            <img src="/assets/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Panel de Gestión</span>
        </a>
        <div class="header-nav">
            <!-- REFACTORIZACIÓN: Enlace a la nueva página de dashboard -->
            <a href="/dashboard" class="nav-link">📊 Estadísticas</a>
        </div>
    </header>

    <div class="admin-container" id="admin-main-container">
        <div class="admin-tabs">
            <button class="tab-link active" data-tab="tab-careers">Carreras</button>
            <button class="tab-link" data-tab="tab-courses">Cursos</button>
            <button class="tab-link" data-tab="tab-students">Alumnos</button>
            <button class="tab-link" data-tab="tab-topics">Temas</button>
            <button class="tab-link" data-tab="tab-books">Recursos</button>
            <!-- NUEVO: Pestaña para inyección masiva de preguntas -->
            <button class="tab-link" data-tab="tab-questions">Preguntas</button>
            <!-- NUEVO: Gestión de Vocabulario Colaborativo -->
            <button class="tab-link" data-tab="tab-vocabularies">Vocabulario Global</button>
        </div>

        <!-- Contenido de las Pestañas -->

        <div id="tab-careers" class="tab-content active"></div>
        <div id="tab-courses" class="tab-content"></div>

        <div id="tab-students" class="tab-content"></div>
        <div id="tab-topics" class="tab-content"></div>
        <div id="tab-books" class="tab-content"></div>
        <div id="tab-questions" class="tab-content"></div>
        <div id="tab-vocabularies" class="tab-content"></div>
    </div>

    <!-- Modal Genérico Rediseñado -->
    <div id="generic-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="generic-modal-title">Título del Modal</h2>
                <button class="modal-close-btn modal-close" id="generic-modal-close-btn">×</button>
            </div>
            <form id="generic-form">
                <div class="modal-body" id="generic-form-fields">
                    <!-- Campos del formulario para Cursos -->
                    <!-- Los campos se inyectarán dinámicamente con JavaScript -->
                </div>
                <div class="modal-footer">
                    <button type="button" id="generic-cancel-btn" class="btn-secondary"
                        onclick="window.adminManager.closeGenericModal()">Cancelar</button>
                    <button type="submit" id="generic-save-btn" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- NUEVO: Modal de Confirmación Genérico -->
    <div id="confirmation-modal" class="modal modal-overlay" style="display: none; z-index: 2147483647;">
        <!--2147483647 para que este por encima de todo-->
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2 id="confirmation-modal-title">Confirmación</h2>
                <button class="modal-close-btn modal-close">×</button>
            </div>
            <div class="modal-body">
                <p id="confirmation-modal-message">¿Estás seguro de realizar esta acción?</p>
            </div>
            <div class="modal-footer">
                <button id="confirmation-modal-cancel" class="btn-secondary">Cancelar</button>
                <button id="confirmation-modal-confirm" class="btn-primary">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Barra de Acciones Masivas (Flotante) -->
    <div id="admin-bulk-actions-bar" class="admin-bulk-actions-bar">
        <span class="bulk-actions-text" id="bulk-actions-text">0 elementos seleccionados</span>
        <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-secondary" id="bulk-cancel-selection-btn" style="height: 36px; padding: 0 15px; font-size: 0.85rem;">Desmarcar todos</button>
            <button type="button" class="btn-primary" id="bulk-delete-btn" style="height: 36px; padding: 0 15px; background: #ef4444; border-color: #ef4444; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;">
                <i class="fas fa-trash-alt"></i> Eliminar Seleccionados
            </button>
        </div>
    </div>

    <script src="/js/config.js?v=21c49b5e"></script> <!-- NUEVO: Configuración global -->

    <script src="/js/services/networkService.js?v=21c49b5e"></script>
    <script src="/js/services/authApiService.js?v=21c49b5e"></script> <!-- NUEVO: Servicio de API de Auth -->
    <script src="/js/sessionManager.js?v=21c49b5e"></script> <!-- NUEVO: Gestor de sesión -->
    <script src="/js/ui/uiManager.js?v=21c49b5e"></script> <!-- NUEVO: Gestor UI -->
    <script src="/js/ui/components.js?v=21c49b5e"></script> <!-- CORRECCIÓN: Incluir el script de componentes -->
    <script src="/js/ui/confirmationModal.js?v=21c49b5e"></script> <!-- NUEVO: Modal de confirmación -->
    <script src="/js/security.js?v=21c49b5e"></script> <!-- NUEVO: Escudo de Seguridad -->
    <script src="/js/ui/sidebar.js?v=21c49b5e"></script>
    <script src="/js/app.js?v=21c49b5e"></script> <!-- NUEVO: Inicialización global -->
    <script src="/js/admin.js?v=21c49b5e"></script> <!-- Forzar recarga absoluta -->
</body>

</html>
